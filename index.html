<!DOCTYPE html>
<html>
<head>
  <title>Gold Tracking</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }
    header {
      background: black;
      color: gold;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }
    input, button, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }
    input {
      background: #2a2a2a;
      color: white;
    }
    button {
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .hidden { display:none; }
    .status {
      padding:6px 10px;
      border-radius:5px;
      font-weight:bold;
      display:inline-block;
    }
    .Ongoing { background:#1f7a1f; }
    .Held { background:#a67c00; }
    .Stopped { background:#8b0000; }
    .Delivered { background:#004080; }
  </style>
</head>
<body>

<header>🚛 Gold Tracking</header>

<div class="container" id="trackingSection">
  <h3>Track Your Shipment</h3>
  <input type="text" id="trackingInput" placeholder="Enter Tracking ID">
  <button onclick="trackShipment()">Track Shipment</button>
  <div id="result" style="margin-top:20px;"></div>
  <button onclick="showAdmin()" style="margin-top:20px;">Admin Login</button>
</div>

<div class="container hidden" id="adminSection">
  <h3>Admin Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="adminDashboard" class="hidden">
    <h3>Create Shipment</h3>
    <input type="text" id="customer" placeholder="Customer Name">
    <input type="text" id="origin" placeholder="Origin">
    <input type="text" id="destination" placeholder="Destination">
    <button onclick="createShipment()">Create Shipment</button>

    <h3 style="margin-top:30px;">All Shipments</h3>
    <div id="shipmentsList"></div>

    <button onclick="logout()" style="margin-top:20px;">Logout</button>
  </div>
</div>

<script>
  const supabaseUrl = "https://goldtrack-ebnuveu9.manus.space";
  const supabaseKey = "https://glklaxiwbhynwvvanzfk.supabase.co";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  function showAdmin(){
    document.getElementById("trackingSection").classList.add("hidden");
    document.getElementById("adminSection").classList.remove("hidden");
  }

  async function trackShipment(){
    const id = document.getElementById("trackingInput").value;
    const { data } = await supabase.from("shipments").select("*").eq("tracking_id", id).single();
    if(!data){
      document.getElementById("result").innerHTML = "Tracking not found.";
      return;
    }
    document.getElementById("result").innerHTML = `
      <p><strong>Customer:</strong> ${data.customer_name}</p>
      <p><strong>Route:</strong> ${data.origin} → ${data.destination}</p>
      <p>Status: <span class="status ${data.status}">${data.status}</span></p>
      <p>Last Updated: ${new Date(data.updated_at).toLocaleString()}</p>
    `;
  }

  async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){ alert("Login failed"); return; }
    document.getElementById("adminDashboard").classList.remove("hidden");
    loadShipments();
  }

  async function logout(){
    await supabase.auth.signOut();
    location.reload();
  }

  function generateTracking(){
    return "GT-" + Math.floor(10000 + Math.random()*90000);
  }

  async function createShipment(){
    const tracking = generateTracking();
    await supabase.from("shipments").insert([{
      tracking_id: tracking,
      customer_name: document.getElementById("customer").value,
      origin: document.getElementById("origin").value,
      destination: document.getElementById("destination").value,
      status: "Ongoing",
      updated_at: new Date()
    }]);
    alert("Shipment Created: " + tracking);
    loadShipments();
  }

  async function loadShipments(){
    const { data } = await supabase.from("shipments").select("*");
    let html="";
    data.forEach(s=>{
      html += `
      <div style="border:1px solid #333;padding:10px;margin:10px 0;">
        <strong>${s.tracking_id}</strong> - ${s.customer_name}<br>
        ${s.origin} → ${s.destination}<br>
        <select onchange="updateStatus('${s.tracking_id}', this.value)">
          <option ${s.status=="Ongoing"?"selected":""}>Ongoing</option>
          <option ${s.status=="Held"?"selected":""}>Held</option>
          <option ${s.status=="Stopped"?"selected":""}>Stopped</option>
          <option ${s.status=="Delivered"?"selected":""}>Delivered</option>
        </select>
      </div>
      `;
    });
    document.getElementById("shipmentsList").innerHTML=html;
  }

  async function updateStatus(id,status){
    await supabase.from("shipments").update({status:status,updated_at:new Date()}).eq("tracking_id",id);
    loadShipments();
  }
</script>

</body>
</html>
